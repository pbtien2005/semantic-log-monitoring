services:
  app:
    build:
      context: .
    ports:
      - "127.0.0.1:8501:80"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      MILVUS_URI: http://milvus:19530
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_LOGS_RAW_TOPIC: logs.raw
      KAFKA_LOGS_FAILED_TOPIC: logs.failed
      KAFKA_CONSUMER_GROUP: semantic-ingestion
      CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://cliproxyapi:8317/v1}
      CLIPROXY_PLANNER_MODEL: ${CLIPROXY_PLANNER_MODEL:-gpt-5.4}
      CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.5}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-cliproxy}
      EMBEDDING_MODEL: intfloat/multilingual-e5-base
      RAW_LOG_STORE_URL: http://opensearch:9200
      RAW_LOG_INDEX: semantic-raw-logs
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy

  semantic-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "infra/scripts/ingestion/consume_kafka_logs.py"]
    environment:
      MILVUS_URI: http://milvus:19530
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_LOGS_RAW_TOPIC: logs.raw
      KAFKA_LOGS_FAILED_TOPIC: logs.failed
      KAFKA_CONSUMER_GROUP: semantic-ingestion
      INGESTION_BATCH_SIZE: ${INGESTION_BATCH_SIZE:-100}
      INGESTION_FLUSH_INTERVAL_SECONDS: ${INGESTION_FLUSH_INTERVAL_SECONDS:-2}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_MODEL: intfloat/multilingual-e5-base
      RAW_LOG_STORE_URL: http://opensearch:9200
      RAW_LOG_INDEX: semantic-raw-logs
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      milvus:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: semantic-log-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-SemanticLocalAdmin1!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - ./infra/opensearch/data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 30

  kafka:
    image: apache/kafka:4.0.0
    container_name: semantic-log-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "127.0.0.1:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic logs.raw --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic logs.failed --partitions 3 --replication-factor 1

  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    container_name: semantic-log-cliproxyapi
    restart: unless-stopped
    ports:
      - "127.0.0.1:8317:8317"
    volumes:
      - ./infra/cliproxyapi/config.yaml:/CLIProxyAPI/config.yaml
      - ./infra/cliproxyapi/auth:/root/.cli-proxy-api

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./infra/milvus/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "127.0.0.1:9001:9001"
      - "127.0.0.1:9000:9000"
    volumes:
      - ./infra/milvus/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v3.0-beta
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./infra/milvus/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
